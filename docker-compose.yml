services:
  backend:
    build:
      context: ./backend
      target: dev
    container_name: ecashengine-backend-dev
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-3000}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      SITE_NAME: ${SITE_NAME:-e-CashEngine}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      AI_GENERATION_SECRET: ${AI_GENERATION_SECRET:-}
      AUTO_GENERATE_ARTICLES: ${AUTO_GENERATE_ARTICLES:-false}
      ARTICLES_DATA_DIR: /app/data
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_data:/app/data
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: ecashengine-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NODE_ENV: development
      API_URL: ${API_URL:-http://backend:4000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - backend

volumes:
  backend_node_modules:
  backend_data:
  frontend_node_modules:
  frontend_next:
