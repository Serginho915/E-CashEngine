services:
  backend:
    build:
      context: ./backend
      target: runner
    container_name: ecashengine-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.1-8b-instruct}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-3000}
      SITE_URL: ${SITE_URL:-https://e-cashengine.com}
      SITE_NAME: ${SITE_NAME:-e-CashEngine}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      AI_GENERATION_SECRET: ${AI_GENERATION_SECRET:-}
      AUTO_GENERATE_ARTICLES: ${AUTO_GENERATE_ARTICLES:-true}
      ARTICLES_DATA_DIR: /app/data
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      target: runner
    container_name: ecashengine-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_URL: ${API_URL:-http://backend:4000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://e-cashengine.com}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - backend

volumes:
  backend_data:
